<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Rejected</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header h1 {
            color: #d9534f;
        }
        .content {
            text-align: center;
            padding: 20px;
        }
        .reason-box {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            color: #ffffff;
            background: #dc3545;
            text-decoration: none;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Product Rejected</h1>
        </div>
        <div class="content">
            <p>Dear {{user.username}},</p>
            <p>Unfortunately, your product submission has been rejected due to the following reason(s):</p>
            <div class="reason-box">
                <p><strong>{{reason}}</strong></p>
            </div>
            <p>You may review our submission guidelines and resubmit your product if applicable.</p>
            <a href="#" class="button">Review Guidelines</a>
        </div>
        <div class="footer">
            <p>&copy; 2025 VersityFinds. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
