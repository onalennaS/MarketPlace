{% extends 'home/base.html' %}

{% block title %}Address book{% endblock %}

{% block nav %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Navbar Styling */
        body{
            overflow-x: hidden;
            
            
        }
       
        .cards{
            border: 2px solid red ;
            transition: all 0.5s ease;
        }
        .cards:hover {
        transform: scale(1.02);
        border: 2px solid blue; /* Subtle highlight on hover */
    }
        #navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            z-index: 1030;
            position: sticky;
            top: 0; /* Ensures the navbar stays at the top */
            width: 100%;
        }
        .nav-link {
            color: #333;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-link.active, .nav-link:hover {
            background-color: #165baa;
            color: #fff;
        }

        /* Sidebar Styling */
        .sidebar {
            background: linear-gradient(135deg, #2a4b8c, #3c81cc);
            color: white;
            height: 100vh;
            padding: 20px 0;
            border-right: 1px solid #dee2e6;
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-y: auto; /* Enable scrolling for the sidebar */
            max-height: 100vh; /* Ensures the sidebar doesn't extend beyond the viewport */
        }
        .sidebar .nav-link {
            color: whitesmoke;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link.active {
            color: #1f406a;
            background-color: white;
        }
        .sidebar .nav-link:hover {
            background-color: #1f406a;
            color: white;
            font-size: 18px;
        }

        /* Sidebar Toggle Button Beneath Navbar */
        #sidebarToggle {
            background-color: transparent;
            border: none;
            color: gray;
            position: absolute;
            left: 0px;
            font-size: 30px;
            cursor: pointer;
        }

        /* Close Button in Sidebar */
        .close-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: red; /* Red cross */
            cursor: pointer;
        }
         #offcanvasRight1, #offcanvasRight {
                width: 50%;
            }
        /* Responsive Sidebar */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                width: 250px;
                z-index: 1050;
            }
            .sidebar.active {
                left: 0;
            }
            .close-btn {
                display: block;
            }
            #offcanvasRight1, #offcanvasRight{
                width: 100%;
            }
        }

        /* Profile Section */
        .profile-upload {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }
        .profile-upload img {
            border: 5px solid gray;
            border-radius: 50%;
            width: 90px;
            height: 85px;
            object-fit: cover;
        }

        /* Content Section */
        .content {
            padding:0 ;
            margin-left: 0; /* Reset left margin */
            overflow-y: auto; /* Enable scrolling for content */
            background-color: #f9f9f9; /* Light background color */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow for 3D effect */

            
        }




        /* Navbar Toggler for Mobile */
        .navbar-toggler {
            border: none;
        }

        
        /* Hide the Sidebar Toggle Button on larger screens */
        @media (min-width: 768px) {
            #sidebarToggle {
                display: none;
            }
            .content {
                padding:0 ;

                }
         .inner{
            padding: 40px;
        }
        .pad{
            padding-left :15px;
            padding-right: 15px;
        }
        #pad{
            margin:1px;
        }

        }
        @media (max-width: 768px){
               .inner{
            padding: 0px;
            margin-top:50px;
        }
        .pad{
            padding:0px;
        }
        }

        /* Welcome Text Animation */
        .welcome-text {
            color: white;
            font-size: 18px;
            display: inline-block;
            white-space: nowrap;
            animation: shiftText 3s infinite alternate;
        }

        .welcome-text i {
            margin-right: 8px;
            font-size: 20px;
            vertical-align: middle;
        }

        @keyframes shiftText {
            0% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(20px);
            }
            100% {
                transform: translateX(0);
            }
        }
         .flex-container {
            display: flex;
            align-items: center; /* Aligns text and hr vertically */
        }

        hr {
            flex-grow: 1; /* Makes the <hr> take up remaining space */
            margin-left: 5px; /* Space between text and line */
             border: 0; /* Remove default border */
            border-top: 2px solid white;
        }
        .view a:hover{
            transform: scale(1.02);
            background-color: red;
        }
        
        {% block styles %}

{% endblock %}
    </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <img class="nav-logo" src="{% static '/images/logo.png' %}" alt="Logo" height="60px" width="200px">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse px-4" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'base' %}">
                        <i class="fas fa-store me-2"></i> Sell on Marketplace
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown">
                        <img src="{% static 'images/default_profile.png' %}" alt="Profile" class="rounded-circle" height="40">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="{% url 'home' %}">Home</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                    </ul>
                </li>
                 <li class="nav-item">
                    <a class="nav-link" href="{% url 'wish_lists' %}">
                        <i class="fas fa-heart text-danger fa-2x "></i> 
                    </a>
                </li>
                 <li class="nav-item">
                    <a class="nav-link" href="{% url 'cart' %}">
                        
                        <i class="fas fa-cart-plus  fa-2x text-success "></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>



        <!-- Main Content -->
        <div class="col-md-9 content ">

            <div class="inner">

               

            {% block content %}
            
            {% endblock content %}
            </div>
        </div>
    </div>
</div>

<script src="{% static 'css/bootstrap.bundle.min.js' %}"></script>
<script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const closeBtn = document.querySelector('.close-btn');

    toggleBtn.addEventListener('click', () => sidebar.classList.toggle('active'));
    closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));
</script>

</body>
</html>
