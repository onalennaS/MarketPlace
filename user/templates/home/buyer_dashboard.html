<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Navbar Styling */
        #navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            z-index: 1030;
        }
        .navbar-nav {
            display: flex;
            justify-content: flex-end;
        }
        .nav-link {
            color: #333;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-link.active, .nav-link:hover {
            background-color: #165baa;
            color: #fff;
        }
        .navbar-toggler {
            border: none;
        }

        /* Sidebar Styling */
        .sidebar {
    background-color: #f8f9fa; /* Set background color here */
    height: 100vh;
    padding: 20px 0;
    border-right: 1px solid #dee2e6;
    position: sticky;
    top: 0;
    z-index: 1000;
}
        .sidebar .nav-link {
            color: #333;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #007bff;
        }
        .sidebar .nav-link:hover {
            background-color: #165baa;
            color: white;
        }

        /* Profile Section */
        .profile-upload {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }
        .profile-upload .upload-btn {
            display: inline-block;
            font-size: 40px;
            color: #007bff;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .profile-upload .upload-btn:hover {
            color: #0056b3;
        }
        .profile-upload p {
            font-weight: bold;
            color: #333;
        }

        /* Profile Image with Circular Green Border */
        .profile-upload img {
            border: 5px solid gray; /* Green border */
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-upload img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* Content Section */
        .content {
            margin-left: 0;
            padding: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: -100%;
                width: 250px;
                transition: left 0.3s ease;
            }
            .sidebar.active {
                left: 0;
            }
            .content {
                margin-left: 0;
            }
            #navbar .navbar-toggler {
                display: block;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <div class="logo">
            <img class="nav-logo" src="{% static '/images/logo.png' %}" alt="Logo" height="60px" width="200px">
        </div>
        <button class="navbar-toggler" type="button" id="sidebarToggle" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link sell-link text-left" href="{% url 'base' %}">
                        <i class="fas fa-store me-2"></i> Sell on Our Marketplace
                    </a>
                </li>
            </ul>
            
            <!-- Profile Dropdown -->
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{% static 'images/default_profile.png' %}" alt="Profile" class="rounded-circle" height="50">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item" href="{% url 'home' %}">Home</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 sidebar" id="sidebar">
            <div class="profile-upload">
                <label for="file-upload" class="custom-file-upload">
                    <img id="profileImage" src="{% static 'images/default_profile.png' %}" alt="Profile Image">
                </label>
                <input type="file" id="file-upload" style="display: none;" />
                <p>Welcome, User!</p>
            </div>
            <ul class="nav flex-column px-3">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'profile' %}">
                        <i class="fas fa-user me-2"></i> Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'order_history' %}">
                        <i class="fas fa-history me-2"></i> Order History
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'wish_lists' %}">
                        <i class="fas fa-heart me-2"></i> Wish Lists
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'track_orders' %}">
                        <i class="fas fa-map-marker-alt me-2"></i> Track Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'buyer_reviews' %}">
                        <i class="fas fa-star me-2"></i> Reviews
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'account_settings' %}">
                        <i class="fas fa-user-cog me-2"></i> Account Settings
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'buyer_support' %}">
                        <i class="fas fa-headset me-2"></i> Support
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 content">
            {% block content %}
            {% endblock content %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle sidebar for mobile view
    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('active');
    });
</script>

</body>
</html>
