<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Navbar styling */
        #navbar {
            border-bottom: 1px solid #dee2e6;
            background-color: #fff;
            z-index: 1030;
        }

        .navbar-nav {
            display: flex;
            justify-content: center; /* Ensures the items are centered */
        }

        .nav-link {
            color: #333;
            font-size: 16px;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .nav-link.active, .nav-link:hover {
            background-color: #165baa;
            color: #fff;
        }

        .navbar-toggler {
            border: none;
        }

        /* Styled 'Sell on Marketplace' link */
        .sell-link {
            color: #165baa;
            border-radius: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }


        /* Sidebar styling */
        .sidebar {
            background-color: #f8f9fa;
            height: 100vh;
            padding: 20px 0;
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
            position: sticky;
            top: 0;
        }

        .profile-upload img {
            border: 2px solid #007bff;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
        }

        .sidebar .nav-link {
            color: #333;
            transition: color 0.3s, background-color 0.3s;
        }

        .sidebar .nav-link.active {
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
        }

        .sidebar .nav-link:hover {
            color: #fff;
            background-color: #165baa;
        }

        .content {
            margin-left: 0;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                z-index: 1000;
                left: -100%;
                transition: left 0.3s ease;
            }

            .sidebar.active {
                left: 0;
            }

            .content {
                margin-left: 0;
            }
        }

        /* Profile image hover effect */
        .profile-upload img {
            border: 2px solid;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-upload img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <div class="logo">
                <img class="nav-logo" src="{% static '/images/logo.png' %}" alt="Logo" height="60px" width="200px">
            </div>
            <button class="navbar-toggler" type="button" id="sidebarToggle" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto"> <!-- ms-auto to push content to the right -->
                    <!-- Sell on Marketplace Link -->
                    <li class="nav-item">
                        <a class="nav-link sell-link text-left" href="{% url 'base' %}">
                            Sell on Our Marketplace
                        </a>
                    </li>
                </ul>
            </div>
            


                <!-- Profile Dropdown -->
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="{% static 'images/default_profile.png' %}" alt="Profile" class="rounded-circle" height="50">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                            <li><a class="dropdown-item" href="{% url 'home' %}">Home</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar bg-light shadow-sm" id="sidebar">
                <div class="profile-upload text-center py-4">
                    <label for="file-upload" class="custom-file-upload">
                        <img id="profileImage" src="{% static 'images/default_profile.png' %}" alt="Profile Image">
                    </label>
                    <p class="fw-bold">Welcome, User!</p>
                </div>
                <ul class="nav flex-column px-3">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'profile' %}">
                            <i class="fas fa-user me-2"></i> Profile
                        </a>
                    </li>
                    

                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'browse_products' %}">
                            <i class="fas fa-shopping-cart me-2"></i> Browse Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'order_history' %}">
                            <i class="fas fa-history me-2"></i> Order History
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'favorites' %}">
                            <i class="fas fa-heart me-2"></i> Favorites
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'track_orders' %}">
                            <i class="fas fa-map-marker-alt me-2"></i> Track Orders
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'buyer_reviews' %}">
                            <i class="fas fa-star me-2"></i> Reviews
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'account_settings' %}">
                            <i class="fas fa-user-cog me-2"></i> Account Settings
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center" href="{% url 'buyer_support' %}">
                            <i class="fas fa-headset me-2"></i> Support
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 content">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle sidebar for mobile view
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });
    </script>
</body>
</html>
