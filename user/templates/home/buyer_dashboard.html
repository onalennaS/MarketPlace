<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Navbar Styling */
        #navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            z-index: 1030;
            position: sticky;
            top: 0; /* Ensures the navbar stays at the top */
            width: 100%;
        }
        .nav-link {
            color: #333;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-link.active, .nav-link:hover {
            background-color: #165baa;
            color: #fff;
        }

        /* Sidebar Styling */
        .sidebar {
            background-color: #f8f9fa;
            height: 100vh;
            padding: 20px 0;
            border-right: 1px solid #dee2e6;
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-y: auto; /* Enable scrolling for the sidebar */
            max-height: 100vh; /* Ensures the sidebar doesn't extend beyond the viewport */
        }
        .sidebar .nav-link {
            color: #333;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #007bff;
        }
        .sidebar .nav-link:hover {
            background-color: #165baa;
            color: white;
        }

        /* Sidebar Toggle Button Beneath Navbar */
        #sidebarToggle {
            background-color: transparent;
            border: none;
            color: gray;
            position: absolute;
            left: 0px;
            font-size: 30px;
            cursor: pointer;
        }

        /* Close Button in Sidebar */
        .close-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: red; /* Red cross */
            cursor: pointer;
        }

        /* Responsive Sidebar */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                width: 250px;
                z-index: 1050;
            }
            .sidebar.active {
                left: 0;
            }
            .close-btn {
                display: block;
            }
        }

        /* Profile Section */
        .profile-upload {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }
        .profile-upload img {
            border: 5px solid gray;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
        }

        /* Content Section */
        .content {
            padding: 20px;
            margin-left: 0; /* Reset left margin */
            overflow-y: auto; /* Enable scrolling for content */
            background-color: #f9f9f9; /* Light background color */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow for 3D effect */
        }

        /* Navbar Toggler for Mobile */
        .navbar-toggler {
            border: none;
        }

        /* Hide the Sidebar Toggle Button on larger screens */
        @media (min-width: 768px) {
            #sidebarToggle {
                display: none;
            }
        }

        /* Welcome Text Animation */
        .welcome-text {
            color: black;
            font-size: 18px;
            display: inline-block;
            white-space: nowrap;
            animation: shiftText 3s infinite alternate;
        }

        .welcome-text i {
            margin-right: 8px;
            font-size: 20px;
            vertical-align: middle;
        }

        @keyframes shiftText {
            0% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(20px);
            }
            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <img class="nav-logo" src="{% static '/images/logo.png' %}" alt="Logo" height="60px" width="200px">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'base' %}">
                        <i class="fas fa-store me-2"></i> Sell on Marketplace
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown">
                        <img src="{% static 'images/default_profile.png' %}" alt="Profile" class="rounded-circle" height="40">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="{% url 'home' %}">Home</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Sidebar Toggle Button (Beneath Navbar) -->
<button id="sidebarToggle" class="btn">
    <i class="fas fa-bars"></i>
</button>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 sidebar" id="sidebar">
            <div class="close-btn">
                <i class="fas fa-times"></i> <!-- Close Icon -->
            </div>
            <div class="profile-upload">
                <img id="profileImage" src="{% static 'images/default_profile.png' %}" alt="Profile Image">
                <p class="welcome-text">Welcome, {{ user.username }}!</p>
            </div>
            <ul class="nav flex-column px-3">
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'profile' %}">
                        <i class="fas fa-user me-2"></i> Profile
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'order_history' %}">
                        <i class="fas fa-history me-2"></i> Order History
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'wish_lists' %}">
                        <i class="fas fa-heart me-2"></i> Wish Lists
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'track_orders' %}">
                        <i class="fas fa-map-marker-alt me-2"></i> Track Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'buyer_reviews' %}">
                        <i class="fas fa-star me-2"></i> Reviews
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'account_settings' %}">
                        <i class="fas fa-user-cog me-2"></i> Account Settings
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link d-flex align-items-center" href="{% url 'buyer_support' %}">
                        <i class="fas fa-headset me-2"></i> Support
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-md-9 content">
            {% block content %}
            {% endblock content %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const closeBtn = document.querySelector('.close-btn');

    toggleBtn.addEventListener('click', () => sidebar.classList.toggle('active'));
    closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));
</script>

</body>
</html>
