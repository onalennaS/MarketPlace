<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Add border at the bottom of the navbar */
        #navbar {
            border-bottom: 1px solid #dee2e6;
        }
        /* Sidebar styling */
        .sidebar {
            min-height: 100vh;
            width: 250px;  
          
            border-right: 1px solid #dee2e6;
            overflow-y: auto;
            position: -webkit-sticky; /* For Safari */
            position: sticky;
            top: 0; /* Stick to the top */
            max-height: 100vh; /* Limit height */
            overflow-y: auto; /* Enable vertical scrolling */
        }
        .sidebar .nav-link {
            color:black;
            transition: color 0.3s, background-color 0.3s; /* Smooth transition for hover effect */
            padding: 8px 10px; /* Add padding for better click area */
            border-radius: 4px; /* Optional: rounded corners */
        }
        .sidebar .nav-link.active {
            font-weight: bold;
            color: #007bff;
        }
        .sidebar .nav-link:hover {
            color: #fff; /* Change text color to white on hover */
            background-color: #165baa; /* Background color on hover */
        }
        .profile-upload {
            text-align: center;
            margin-bottom: 20px;
        }
        .separator {
            border-bottom: 1px solid #dee2e6;
            margin: 5px 0;
        }
        .custom-file-upload {
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; /* Fixed position for sidebar on mobile */
                height: 100%; /* Full height */
                z-index: 1000; /* Ensure sidebar is above other content */
                left: -100%; /* Initially hide the sidebar off-screen */
                transition: left 0.3s ease; /* Smooth transition for sliding */
            }
            .sidebar.active {
                left: 0; /* Show the sidebar when active */
            }
            .navbar-toggler {
                display: block; /* Show the toggle button */
            }
            .content {
                margin-left: 0; /* Ensure no margin on left */
            }
        }
        .content {
            margin-left: 0; /* Ensure no margin on left */
            padding: 2px; /* Adjust padding as needed */
        }
    </style>
</head>
<body>

   <nav id="navbar" class="navbar navbar-expand-lg bg-body-primary">
        <div class="container-fluid">
            <div class="logo" id="logo">
                <img class="nav-logo" src="{% static 'images/logo.png' %}" alt="Logo" height="110px" width="350px">
            </div>
            <button class="navbar-toggler" type="button" id="sidebarToggle" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'home' %}">Home</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar" id="sidebar">
                <div class="profile-upload">
                    <label for="file-upload" class="custom-file-upload">
                        <img id="profileImage" src="{% static 'images/default_profile.png' %}" alt="Profile Image" style="cursor: pointer; max-height: 150px; border: none; box-shadow: none;">
                    </label>
                    <input id="file-upload" type="file" class="form-control" accept="image/*" onchange="previewImage(event)" style="display: none;">
                </div>
    
                <div class="separator"></div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'user_profile' %}"><i class="fas fa-user"></i> Seller Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'business_info' %}">
                            <i class="fas fa-building"></i> Business Information
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'view_stats' %}"><i class="fas fa-chart-line"></i> View Stats</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_products' %}"><i class="fas fa-plus"></i> Add Products</a>
                    </li>
                    

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'edit_products' %}"><i class="fas fa-edit"></i> Edit Products</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'orders' %}"><i class="fas fa-box"></i> Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'order_tracking' %}"><i class="fas fa-truck"></i> Order Tracking</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'transaction' %}"><i class="fas fa-credit-card"></i> Transaction</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pay_for_premium' %}"><i class="fas fa-star"></i> Pay for Premium</a>
                    </li>
                     <li class="nav-item">
                        <a class="nav-link" href="{% url 'base' %}"><i class="fas fa-star"></i> studio</a>
                    </li>
                </ul>
            </div>

            <div class="col-md-9 content">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle sidebar for mobile view
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });
    </script>
    
</body>
</html>
