{% extends 'home/buyer_dashboard.html' %}

{% block title %}Gift Card{% endblock %}

{% block content %}
<style>
    
    /* Inherit the font family from the sidebar */
    .card {
        background-color: transparent; /* Removes the background color */
        border: 1px solid #ddd; /* Adds a subtle border for structure */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Adds a soft shadow */
        transition: border-color 0.3s ease, transform 0.3s ease;
        font-family: Arial, sans-serif; /* Ensure the card text matches sidebar text */
    }

    /* Apply hover effect */
    .card:hover {
        transform: scale(1.02);
        border-color: #0f4f8a; /* Subtle highlight on hover */
    }

    .card-header {
        color: #333; /* Ensures good contrast */
        font-weight: normal; /* Heading is not bold */
    }

    .card-title {
        display: flex;
        align-items: center;
        font-weight: normal; /* Ensures card titles are not bold */
    }

    .card-title i {
        margin-right: 8px;
    }

    .btn-custom {
        background-color: #165baa;
        color: white;
        border: none;
    }
    
    .btn-custom:hover {
        background-color: #0f4f8a;
    }

    .form-check-label {
        margin-left: 10px;
    }

     .triangle {
            width: 0;
            height: 0;
            border-right: 120px solid transparent; /* Left side of the triangle */
            border-bottom: 120px solid white; /* Bottom side of the triangle */
            transform: scaleY(-1);

            margin-left: -25px;
        }
    
</style>


<div class="container mt-5">
   <!-- Breadcrumb navigation -->
<nav aria-label="breadcrumb">
    <ol class="breadcrumb" style="background: linear-gradient(135deg,  #1a2848, #2c76b7); border-radius: 0; padding: 8px 15px;">

       <!--  <li class="breadcrumb-item">
            <a href="{% url 'home' %}" style="color: white; text-decoration: none;">Home</a>
        </li> -->

        <li class="breadcrumb-item">
            <a href="{% url 'dash' %}" style="color: white; text-decoration: none;"> My Account </a>
        </li>
        <li class="breadcrumb-item active" aria-current="page" style="color: white;">Gift Card</li>
    </ol>
</nav>

    </nav>

    <div>
        <h5 class=" m-2"> Apply Gift Card Voucher to Redeem</h5>
        <div class="card w-100 mb-3 bg-light rounded-0">
            <div class="card-body  p-0" id="username-disp" style="display:block; background: linear-gradient(135deg,  #1a2848, #2c76b7);">
               <div class="d-flex justify-content-between w-100">
                    <div class=" p-3" style="background-color:white; width: 80%;">

                    <div class="form-floating mb-3 w-75">
                              <input type="text" class="form-control border-top-0 border-end-0 border-start-0 border-bottom-2" id="floatingInput" placeholder="" name='Voucher' value="">
                              <label for="floatingInput">Voucher</label>
                            </div>
                    </div>
                    <div class="triangle"></div>
                    <div class="p-3">
                         <button type="button" class="btn btn-outline-light rounded-0 m-0" onclick="">Apply</button>
                    </div>
               </div>
            </div> 

            
        </div>
    </div>


</div>

<script type="text/javascript">
    function edit_button(name){
        var displays = document.getElementById(name+'-disp');
        var forms = document.getElementById(name+'-form');

        displays.style.display = 'none';
        forms.style.display = 'block';
    }
    function cancel_button(name){
        var displays = document.getElementById(name+'-disp');
        var forms = document.getElementById(name+'-form');

        forms.style.display = 'none';
        displays.style.display = 'block';
    }
</script>
{% endblock content %}
