{% extends 'products/shop_base2.html' %}

{% block title %}Register Business{% endblock %}

{% block secend_nav %}
{% endblock %}

{% load static %}
{% block content %}
    <div class="container">
        <h1 class="text-center mb-4">My Registered Businesses</h1>
        
        <div class="row g-4">
            <!-- Example Business Card -->
            <a href="{% url 'user_profile' %}" class="col-sm-6 col-md-4 col-lg-3">
                <div class="register-card shadow-lg border-0">
                    <img src="{% static 'products/image/food.png' %}" class="card-img-top" alt="Business Image">
                    <div class="register-card-overlay">
                        <h5 class="register-card-title">Business Name</h5>
                        <p class="register-card-text">Category: Retail</p>
                    </div>
                </div>
            </a>
            
            <!-- Add New Business Card -->
            <div class="col-sm-6 col-md-4 col-lg-3">
                <a href="{% url 'register_business_form' %}" class="register-card register-add-card text-center p-4 h-100 d-flex align-items-center justify-content-center" onclick="registerBusiness()">
                    <h5 class="text-muted">+ Register New Business</h5>
                </a>
            </div>
        </div>
    </div>
    <script>
  function registerBusiness() {
           window.href=""
            // You can replace this with actual navigation to a registration form
        }
    </script>
{% endblock %}
