<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Navbar Styling */
        #navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #dee2e6;
            z-index: 1030;
        }
        .navbar-nav {
            display: flex;
            justify-content: flex-end;
        }
        .nav-link {
            color: #333;
            font-size: 16px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-link.active, .nav-link:hover {
            background-color: #165baa;
            color: #fff;
        }
        .navbar-toggler {
            border: none;
        }

        /* Sidebar Styling */
        .sidebar {
    background-color: #f8f9fa; /* Set background color here */
    height: 100vh;
    padding: 20px 0;
    border-right: 1px solid #dee2e6;
    position: sticky;
    top: 0;
    z-index: 1000;
}
        .sidebar .nav-link {
            color: #333;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #007bff;
        }
        .sidebar .nav-link:hover {
            background-color: #165baa;
            color: white;
        }

        /* Profile Section */
        .profile-upload {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
        }
        .profile-upload .upload-btn {
            display: inline-block;
            font-size: 40px;
            color: #007bff;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .profile-upload .upload-btn:hover {
            color: #0056b3;
        }
        .profile-upload p {
            font-weight: bold;
            color: #333;
        }

        /* Profile Image with Circular Green Border */
        .profile-upload img {
            border: 5px solid gray; /* Green border */
            border-radius: 50%;
            width: 120px;
            height: 120px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .profile-upload img:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        /* Content Section */
        .content {
            margin-left: 0;
            padding: 20px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: -100%;
                width: 250px;
                transition: left 0.3s ease;
            }
            .sidebar.active {
                left: 0;
            }
            .content {
                margin-left: 0;
            }
            #navbar .navbar-toggler {
                display: block;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
        <div class="logo">
            <img class="nav-logo" src="{% static '/images/logo.png' %}" alt="Logo" height="60px" width="200px">
        </div>
            <button class="navbar-toggler" type="button" id="sidebarToggle" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="{% static 'images/default_profile.png' %}" alt="Profile" class="rounded-circle" height="50">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
                            <li><a class="dropdown-item" href="{% url 'home' %}">Home</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{% url 'logout' %}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 sidebar bg-light shadow-sm" id="sidebar">
                <div class="profile-upload text-center py-4">
                    <label for="file-upload" class="custom-file-upload">
                        <img id="profileImage" src="{% static 'images/default_profile.png' %}" alt="Profile Image">
                    </label>
                    <p class="fw-bold">Welcome, User!</p>

                </div>
                <ul class="nav flex-column px-3">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'user_profile' %}"><i class="fas fa-user"></i> Seller Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'business_info' %}">
                            <i class="fas fa-building"></i> Business Information
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'view_stats' %}"><i class="fas fa-chart-line"></i> View Stats</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'add_products' %}"><i class="fas fa-plus"></i> Add Products</a>
                    </li>
                    

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'edit_products' %}"><i class="fas fa-edit"></i> Edit Products</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'orders' %}"><i class="fas fa-box"></i> Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'order_tracking' %}"><i class="fas fa-truck"></i> Order Tracking</a>
                    </li>
                    <div class="separator"></div>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'transaction' %}"><i class="fas fa-credit-card"></i> Transaction</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pay_for_premium' %}"><i class="fas fa-star"></i> Pay for Premium</a>
                    </li>
                    
                </ul>
            </div>

            <div class="col-md-9 content">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Toggle sidebar for mobile view
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });
    </script>
    
</body>
</html>
