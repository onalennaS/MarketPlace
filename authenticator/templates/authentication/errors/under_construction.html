<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SixSkies | Under Development</title>
  <style>
    body {
      background: darkgray;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .message-box {
      background: linear-gradient(to bottom right, #e3f2fd, #bbdefb);
      color: #0d47a1;
      padding: 3rem 4rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      max-width: 500px;
      transition: transform 0.3s ease;
    }
    .message-box:hover {
      transform: scale(1.03);
    }
    h1 {
      margin-bottom: 1rem;
      font-size: 2rem;
      color: #0d47a1;
    }
    p {
      font-size: 1.1rem;
      color: #333;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="message-box">
    <div class="logo">🔧</div>
    <h1>Page Under Development</h1>
    <p>We are working hard to bring this page to life.<br>Please check back soon.</p>
  </div>
</body>
</html>
