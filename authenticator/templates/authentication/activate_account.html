<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Link Sent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            color: #2ecc71;
        }
        p {
            font-size: 1.2rem;
            color: #555;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1rem;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .icon {
            font-size: 50px;
            color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <i class="fas fa-check-circle icon"></i>
    <h1>An Email Has Been Sent to this email address {{user.email[:13]}}!</h1>
    <p>Please click on the link sent to your email. to activate your account</p>
    <p>if you did not recieve an email from us, please click the button bellow to resend the activation link!</p>
    <a href="{% url 'signin' %}" class="btn">Resend link</a>
</div>

</body>
</html>
