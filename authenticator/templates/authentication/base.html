<!-- authentication/templates/authentication/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <meta name="description" content="Versity Finds is your go-to student marketplace. Sell or Buy FastFood,  textbooks, electronics, and essentials — all for the student budget.">

    <meta name="keywords" content="Versity Finds, student marketplace, buy and sell textbooks, cheap student deals, campus marketplace, student classifieds, college essentials, affordable books">

    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Sign in/register | Versity Finds">
    <meta property="og:description" content="Sign in or register an account to start buying">
    <meta property="og:image" content="{% static '/images/Finds.png' %}">
    <meta property="og:url" content="https://versityfinds.co.za">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sign in/register | Versity Finds ">
    <meta name="twitter:description" content="Sign in or register an account to start buying | Buy, sell, and discover campus deals that fit your student lifestyle. | Student Deals Made Easy ">
    <meta name="twitter:image" content="{% static '/images/Finds.png' %}">
    <link rel="icon" type="image/png" href="{% static '/images/Finds.png' %}">
    <title>{% block title %}Authentication{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/message.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'css/bootstrap.bundle.min.js' %}"></script>
</head>
<body>
    <main>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
